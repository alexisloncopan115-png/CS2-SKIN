<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xican | Elite Arsenal</title>
    
    <!-- Meta etiquetas para Dominio Personalizado -->
    <meta name="description" content="Abre cajas y colecciona las skins más exclusivas en Xican Elite Arsenal.">
    <link rel="canonical" href="https://tu-dominio-aqui.com/" />
    
    <!-- Open Graph (Redes Sociales) -->
    <meta property="og:title" content="Xican | Elite Arsenal">
    <meta property="og:description" content="Tu arsenal, tu estilo. La mejor ruleta de skins.">
    <meta property="og:type" content="website">

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #050505;
            color: #fff;
            font-family: 'Outfit', sans-serif;
            margin: 0;
            overflow-x: hidden;
            min-height: 100vh;
        }

        .bg-glow {
            position: fixed;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at 50% 0%, rgba(59, 130, 246, 0.15) 0%, transparent 70%);
            pointer-events: none;
            z-index: -1;
        }

        /* --- Animaciones de Interfaz --- */
        #rewardPopover {
            display: none;
            opacity: 0;
            transform: translateY(10px) scale(0.95);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
        }

        #rewardPopover.show {
            display: block;
            opacity: 1;
            transform: translateY(0) scale(1);
            pointer-events: auto;
        }

        .bell-btn {
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .bell-btn:active {
            transform: scale(0.85);
        }

        .bell-notif {
            position: absolute;
            top: 0;
            right: 0;
            width: 8px;
            height: 8px;
            background: #ef4444;
            border-radius: 50%;
            box-shadow: 0 0 10px #ef4444;
        }

        /* --- Showcase Infinito --- */
        .showcase-container {
            width: 100%;
            overflow: hidden;
            background: rgba(255,255,255,0.01);
            padding: 50px 0;
            margin-top: 40px;
            border-top: 1px solid rgba(255,255,255,0.05);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .showcase-track {
            display: flex;
            width: fit-content;
            animation: scrollTrack 40s linear infinite;
            gap: 20px;
        }

        @keyframes scrollTrack {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .showcase-item {
            min-width: 200px;
            height: 220px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            border-radius: 24px;
        }

        .showcase-item:hover {
            transform: scale(1.15) translateY(-10px);
            z-index: 10;
        }

        .skin-bg-glow {
            position: absolute;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            filter: blur(40px);
            opacity: 0.15;
            z-index: -1;
            transition: opacity 0.3s ease;
        }

        /* --- Ruleta de Apertura --- */
        #roulette-overlay {
            position: fixed;
            inset: 0;
            background: #050505;
            z-index: 500;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .roulette-viewport {
            width: 100%;
            max-width: 1000px;
            height: 350px;
            position: relative;
            background: rgba(255,255,255,0.02);
            border-top: 1px solid rgba(255,255,255,0.05);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            overflow: hidden;
            display: flex;
            align-items: center;
            mask-image: linear-gradient(to right, transparent, black 20%, black 80%, transparent);
        }

        .roulette-track {
            display: flex;
            position: absolute;
            left: 0;
            height: 100%;
            will-change: transform;
            align-items: center;
        }

        .knife-card {
            min-width: 200px;
            height: 200px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0 10px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 20px;
        }

        .center-indicator {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            top: 0;
            bottom: 0;
            width: 2px;
            background: #facc15;
            z-index: 100;
            box-shadow: 0 0 15px #facc15;
        }

        /* --- Ganador Modal & Transiciones --- */
        #winnerModal.active .winner-content {
            transform: scale(1) translateY(0) rotateX(0deg);
            opacity: 1;
        }

        .winner-content {
            transform: scale(0.6) translateY(100px) rotateX(-20deg);
            opacity: 0;
            transition: all 1s cubic-bezier(0.16, 1, 0.3, 1);
            background: #0a0a0a;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 50px 100px rgba(0,0,0,0.9);
        }

        .winner-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 400px;
            height: 400px;
            filter: blur(100px);
            opacity: 0.4;
            z-index: 0;
            border-radius: 50%;
        }

        #inventoryOverlay {
            position: fixed;
            inset: 0;
            background: #050505;
            z-index: 1000;
            display: none;
            padding: 40px;
            overflow-y: auto;
        }

        .inventory-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
        }

        .btn-action {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 100px;
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }

        .btn-action:hover { background: rgba(255, 255, 255, 0.15); }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <nav class="fixed top-0 left-0 w-full p-6 flex justify-between items-center z-[100]">
        <h1 class="text-2xl font-black italic uppercase tracking-tighter">Xican</h1>
        <div class="flex gap-4 items-center">
            <button onclick="openInventory()" class="btn-action">Inventario</button>
            <div class="relative">
                <button onclick="toggleRewardPopover()" class="bell-btn w-10 h-10 flex items-center justify-center rounded-full bg-white/5 border border-white/10 hover:bg-white/10 transition-all relative">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>
                    <div class="bell-notif" id="bellNotif"></div>
                </button>
                
                <div id="rewardPopover" class="absolute top-14 right-0 w-80 bg-[#111] border border-white/10 p-5 rounded-3xl shadow-2xl z-[200]">
                    <h3 class="text-[10px] font-black uppercase text-white/30 mb-4 tracking-widest">Recompensa Disponible</h3>
                    <div class="bg-white/5 border border-white/10 p-4 rounded-2xl flex items-center gap-4">
                        <img src="https://community.skin.club/wp-content/uploads/2024/11/Prisma-Case_LR.webp" class="w-16 drop-shadow-lg">
                        <div class="flex-1">
                            <p class="font-bold text-sm">Caja Prisma</p>
                            <p class="text-[9px] text-white/40 uppercase mb-3">Drop Semanal</p>
                            <button onclick="claimReward()" class="bg-blue-600 w-full py-2 rounded-lg text-[9px] font-black uppercase hover:bg-blue-500 transition-colors">Abrir Ahora</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <div id="landingPage" class="pt-32">
        <div class="max-w-6xl mx-auto px-6">
            <div class="bg-gradient-to-r from-[#111] to-transparent p-12 rounded-[40px] border border-white/5 relative overflow-hidden mb-12">
                <div class="relative z-10">
                    <span class="text-blue-500 text-[10px] font-black uppercase tracking-widest">Plataforma Elite</span>
                    <h2 class="text-5xl font-black italic uppercase tracking-tighter mt-2 mb-4">Tu Arsenal, Tu Estilo</h2>
                    <p class="text-white/50 max-w-md mb-8">Explora la colección más exclusiva de skins. Revisa tus notificaciones para reclamar tus drops diarios.</p>
                </div>
                <img src="https://static.totalcsgo.com/totalcsgo-strapi/small_skin_6cf3681943576b124a145392d63c91024d3f1926_369f9a5b45.png" class="absolute -right-10 -bottom-10 w-96 opacity-30 rotate-12 pointer-events-none">
            </div>
        </div>
        <div class="showcase-container">
            <div class="showcase-track" id="showcaseTrack"></div>
        </div>
    </div>

    <div id="roulette-overlay">
        <div id="roulette-header" class="mb-12 text-center transition-all duration-700">
            <h2 class="text-[10px] font-black tracking-[1em] text-white/30 uppercase mb-2">Desbloqueando Item</h2>
            <p class="text-2xl font-black italic uppercase tracking-widest">Girando...</p>
        </div>
        
        <div id="roulette-main" class="roulette-viewport transition-all duration-700">
            <div class="center-indicator"></div>
            <div id="track" class="roulette-track"></div>
        </div>
        
        <!-- Modal Ganador -->
        <div id="winnerModal" class="fixed inset-0 bg-black/95 z-[600] hidden flex items-center justify-center p-6">
            <div class="winner-content rounded-[50px] text-center max-w-md w-full p-12 relative overflow-hidden">
                <div id="dynamicGlow" class="winner-glow"></div>
                <div class="relative z-20">
                    <div id="winnerIcon" class="mb-10 scale-125 transition-transform duration-1000"></div>
                    <h3 id="knifeName" class="text-4xl font-black italic uppercase tracking-tighter mb-2">---</h3>
                    <p id="rarityText" class="text-[10px] font-bold uppercase tracking-widest text-white/40 mb-12">---</p>
                    
                    <div class="flex flex-col gap-3">
                        <!-- Botón principal para guardar -->
                        <button onclick="saveAndRestart()" class="w-full bg-white text-black py-5 rounded-2xl font-black uppercase text-xs tracking-widest hover:scale-[1.02] active:scale-95 transition-all">Equipar en Arsenal</button>
                        <!-- Botón para descartar/volver -->
                        <button onclick="goHome()" class="w-full bg-white/5 border border-white/10 text-white/60 py-4 rounded-2xl font-black uppercase text-[10px] tracking-widest hover:bg-white/10 transition-all">Volver al Inicio</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="inventoryOverlay">
        <div class="max-w-6xl mx-auto">
            <div class="flex justify-between items-end mb-12">
                <div>
                    <h2 class="text-4xl font-black italic uppercase tracking-tighter">Mi Colección</h2>
                    <p id="inventoryCount" class="text-white/40 text-[10px] font-bold uppercase mt-2 tracking-widest">0 Skins</p>
                </div>
                <button onclick="closeInventory()" class="btn-action">Cerrar</button>
            </div>
            <div id="inventoryGrid" class="inventory-grid"></div>
        </div>
    </div>

    <audio id="spinSound" loop><source src="https://www.soundjay.com/buttons/sounds/button-20.mp3" type="audio/mpeg"></audio>

    <script>
        const skins = [
            { name: "Butterfly | Doppler", img: "https://cdnsteam.cdnhell.com/730/-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXH5ApeO4YmlhxYQknCRvCo04DEVlxkKgpou-6kejhjxszFJTwT09S5g4yCmfDLP7LWnn8f6pIl2-yYp9SnjA23-BBuNW-iLI-XJgFsZQyG_VW2lOq918e8uszLn2wj5HeAvkVdtQ/360fx360f.png", color: "#9333ea", label: "MÍSTICO" },
            { name: "Karambit | Lore", img: "https://community.cloudflare.steamstatic.com/economy/image/-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXH5ApeO4YmlhxYQknCRvCo04DEVlxkKgpot621FAZ3w8zYYzRM-M-ihoWKmsj5Nr_Yg2Yf6p0n2OzCpIql3gbt-kJlZGnzJ4XAIFM4ZQ7V8wK2yO68g5Pu7pvNzmwj5HeziYMobA", color: "#ffb400", label: "LEGENDARIO" },
            { name: "AK-47 | Empress", img: "https://cdn.sanity.io/images/6znhzi10/production/85be84ba7c07917493b8e8a66c9d95c928ebe8b6-512x384.png?w=768&auto=format", color: "#f59e0b", label: "ESPECIAL" },
            { name: "USP-S | Printstream", img: "https://steamcdn-a.akamaihd.net/apps/730/icons/econ/default_generated/weapon_usp_silencer_cu_usp_printstream_light_large.9f5bcd4f94db3d965b3b2e7c3aace470e9466380.png", color: "#ffffff", label: "EXCLUSIVO" },
            { name: "M4A4 | Howl", img: "https://static.totalcsgo.com/totalcsgo-strapi/small_skin_6cf3681943576b124a145392d63c91024d3f1926_369f9a5b45.png", color: "#ef4444", label: "CONTRABANDO" },
            { name: "Glock-18 | Fade", img: "https://cdn.sanity.io/images/6znhzi10/production/fe01fa79951854eb6e0591eac4b3a72aa76ddc41-512x384.png?w=768&auto=format", color: "#ec4899", label: "ÉPICO" }
        ];

        // Cargar inventario desde localStorage al inicio
        let inventory = JSON.parse(localStorage.getItem('xican_inventory')) || [];
        let isSpinning = false;
        let lastWinner = null;

        function initShowcase() {
            const track = document.getElementById('showcaseTrack');
            [...skins, ...skins, ...skins].forEach(s => {
                const item = document.createElement('div');
                item.className = 'showcase-item';
                item.innerHTML = `
                    <div class="skin-bg-glow" style="background: ${s.color}"></div>
                    <img src="${s.img}" class="w-32 z-10 drop-shadow-[0_15px_25px_rgba(0,0,0,0.4)]">
                    <p class="text-[8px] font-black mt-3 z-10" style="color:${s.color}">${s.name}</p>
                `;
                track.appendChild(item);
            });
        }

        function toggleRewardPopover() {
            const p = document.getElementById('rewardPopover');
            if (p.classList.contains('show')) {
                p.classList.remove('show');
                setTimeout(() => p.style.display = 'none', 400);
            } else {
                p.style.display = 'block';
                requestAnimationFrame(() => p.classList.add('show'));
            }
        }

        function claimReward() {
            const p = document.getElementById('rewardPopover');
            p.classList.remove('show');
            setTimeout(() => {
                p.style.display = 'none';
                document.getElementById('bellNotif').style.display = 'none';
                document.getElementById('roulette-overlay').style.display = 'flex';
                buildRouletteTrack();
                setTimeout(startSpin, 800);
            }, 400);
        }

        function buildRouletteTrack() {
            const t = document.getElementById('track');
            t.innerHTML = '';
            for (let i = 0; i < 90; i++) {
                const s = skins[i % skins.length];
                const card = document.createElement('div');
                card.className = 'knife-card';
                card.innerHTML = `<img src="${s.img}" class="w-28 h-28 object-contain">`;
                t.appendChild(card);
            }
        }

        async function startSpin() {
            if (isSpinning) return;
            isSpinning = true;
            
            const track = document.getElementById('track');
            const audio = document.getElementById('spinSound');
            try { audio.play(); } catch(e){}

            const cardWidth = 220; 
            const winningIndex = 75 + Math.floor(Math.random() * 5);
            const targetPos = (winningIndex * cardWidth) - (window.innerWidth / 2) + (cardWidth / 2);
            
            let startTime = null;
            const duration = 7500;

            function easeOutExpo(t) { return t === 1 ? 1 : 1 - Math.pow(2, -10 * t); }

            function animate(timestamp) {
                if (!startTime) startTime = timestamp;
                let progress = (timestamp - startTime) / duration;
                if (progress > 1) progress = 1;

                const eased = easeOutExpo(progress);
                const currentX = eased * targetPos;
                track.style.transform = `translateX(-${currentX}px)`;

                const cards = track.querySelectorAll('.knife-card');
                const centerX = window.innerWidth / 2;

                cards.forEach(card => {
                    const rect = card.getBoundingClientRect();
                    const cardCenter = rect.left + rect.width / 2;
                    const dist = Math.abs(centerX - cardCenter);
                    if (dist < 150) {
                        const scale = 1 + (0.25 * (1 - dist / 150));
                        card.style.transform = `scale(${scale})`;
                        card.style.opacity = "1";
                    } else {
                        card.style.transform = `scale(1)`;
                        card.style.opacity = "0.4";
                    }
                });

                if (progress < 1) {
                    requestAnimationFrame(animate);
                } else {
                    lastWinner = skins[winningIndex % skins.length];
                    triggerWinnerSequence(lastWinner);
                }
            }
            requestAnimationFrame(animate);
        }

        function triggerWinnerSequence(winner) {
            isSpinning = false;
            document.getElementById('spinSound').pause();
            
            triggerConfetti(winner.color);

            setTimeout(() => {
                document.getElementById('roulette-main').style.opacity = '0';
                document.getElementById('roulette-header').style.opacity = '0';
                
                setTimeout(() => {
                    showWinnerModal(winner);
                }, 600);
            }, 800);
        }

        function showWinnerModal(item) {
            const modal = document.getElementById('winnerModal');
            document.getElementById('knifeName').textContent = item.name;
            document.getElementById('knifeName').style.color = item.color;
            document.getElementById('rarityText').textContent = `Rareza: ${item.label}`;
            document.getElementById('winnerIcon').innerHTML = `<img src="${item.img}" class="w-72 mx-auto drop-shadow-[0_25px_50px_${item.color}66]">`;
            document.getElementById('dynamicGlow').style.background = item.color;
            
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.add('active');
                triggerConfetti(item.color);
            }, 50);
        }

        function triggerConfetti(color) {
            const duration = 2.5 * 1000;
            const animationEnd = Date.now() + duration;
            const defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 1000, colors: [color, '#ffffff'] };

            const interval = setInterval(function() {
                const timeLeft = animationEnd - Date.now();
                if (timeLeft <= 0) return clearInterval(interval);

                const particleCount = 40 * (timeLeft / duration);
                confetti(Object.assign({}, defaults, { 
                    particleCount, 
                    origin: { x: Math.random(), y: Math.random() - 0.2 } 
                }));
            }, 200);
        }

        /**
         * Guarda el objeto actual en el inventario de localStorage y recarga la interfaz
         */
        function saveAndRestart() {
            if (lastWinner) {
                // Crear copia del objeto ganado para el inventario
                const inventoryItem = {
                    ...lastWinner,
                    id: Date.now(), // ID único para evitar conflictos si gana la misma skin dos veces
                    dateAcquired: new Date().toISOString()
                };
                
                // Añadir al arreglo global
                inventory.push(inventoryItem);
                
                // Guardar en el almacenamiento local del navegador
                localStorage.setItem('xican_inventory', JSON.stringify(inventory));
                
                // Retroalimentación visual opcional antes de recargar
                console.log("Skin equipada:", inventoryItem.name);
                
                // Recargar para limpiar la ruleta y volver al inicio
                location.reload();
            }
        }

        function goHome() {
            const modal = document.getElementById('winnerModal');
            modal.classList.remove('active');
            
            setTimeout(() => {
                location.reload(); 
            }, 500);
        }

        function openInventory() {
            document.getElementById('inventoryOverlay').style.display = 'block';
            renderInventory();
        }

        function closeInventory() {
            document.getElementById('inventoryOverlay').style.display = 'none';
        }

        function renderInventory() {
            const grid = document.getElementById('inventoryGrid');
            grid.innerHTML = '';
            
            // Refrescar conteo
            document.getElementById('inventoryCount').textContent = `${inventory.length} Objetos en Arsenal`;
            
            if (inventory.length === 0) {
                grid.innerHTML = '<div class="col-span-full text-center py-20 text-white/20 uppercase font-black tracking-widest text-xs">Tu arsenal está vacío</div>';
                return;
            }

            inventory.forEach(item => {
                const card = document.createElement('div');
                card.className = 'bg-white/5 p-6 rounded-3xl border border-white/10 text-center hover:bg-white/10 transition-all cursor-default';
                card.innerHTML = `
                    <img src="${item.img}" class="w-full h-24 object-contain mb-4 drop-shadow-lg">
                    <p class="text-[9px] font-black uppercase mb-1" style="color:${item.color}">${item.name}</p>
                    <p class="text-[7px] text-white/30 font-bold uppercase tracking-widest">${item.label}</p>
                `;
                grid.appendChild(card);
            });
        }

        window.onload = initShowcase;
    </script>
</body>
</html>
